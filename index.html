<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>QiuX Google</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ====== GLOBAL ====== */

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: radial-gradient(circle at top, #1e1b4b, #0f0a1f);
    color: #e5e7eb;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ====== LOGO ====== */

.logo-container {
    text-align: center;
    margin-top: 120px;
}

.logo {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 10px;
}

.qiux {
    color: #a855f7;
    text-shadow: 0 0 15px #a855f7;
}

.google span {
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
}

/* ====== SPRAWDŹ ORYGINALNOŚĆ ====== */

.verify {
    display: inline-block;
    margin-top: 5px; /* BLIŻEJ LOGO */
    padding: 12px 26px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(168,85,247,0.4);
    border-radius: 12px;
    color: #c4b5fd;
    backdrop-filter: blur(8px);
    text-decoration: none;
    font-size: 20px;
    transition: 0.2s;
    cursor: pointer;
}

.verify:hover {
    background: rgba(168,85,247,0.3);
    color: white;
    transform: scale(1.05);
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-container">
    <h1 class="logo">
        <span class="qiux">QiuX</span>
        <span class="google">
            <span style="color:#4285F4;">G</span>
            <span style="color:#EA4335;">o</span>
            <span style="color:#FBBC05;">o</span>
            <span style="color:#4285F4;">g</span>
            <span style="color:#34A853;">l</span>
            <span style="color:#EA4335;">e</span>
        </span>
    </h1>

    <a class="verify" href="#">Sprawdź oryginalność</a>
</div>

</body>
</html>
