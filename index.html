<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>QiuX Google – Oficjalna Strona</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ====== GLOBAL ====== */
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0a0018;
    color: #e5e7eb;
    text-align: center;

    /* GWIAZDKI 1:1 JAK NA SCREENIE */
    background-image: radial-gradient(circle, rgba(168,85,247,0.25) 1px, transparent 1px);
    background-size: 40px 40px;
}

/* ====== CHMURKI ====== */
body::before, body::after {
    content: "";
    position: fixed;
    width: 900px;
    height: 900px;
    background: radial-gradient(circle, rgba(168,85,247,0.35), transparent 70%);
    filter: blur(120px);
    z-index: -1;
}
body::before { top: -200px; left: -200px; }
body::after { bottom: -200px; right: -200px; }

/* ====== LOGO ====== */
.logo-top {
    margin-top: 40px;
}
.logo-top h1 {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: -3px;
}
.qiux { color: #a855f7; text-shadow: 0 0 20px #a855f7; }
.google span { font-weight: bold; }

/* ====== PRZYCISK ====== */
.verify {
    display: inline-block;
    margin-top: 10px;
    padding: 14px 32px;
    background: rgba(255,255,255,0.08);
    border: 2px solid #a855f7;
    border-radius: 14px;
    color: #e9d5ff;
    font-size: 22px;
    font-weight: 600;
    text-decoration: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px #a855f7;
    transition: 0.25s;
}
.verify:hover {
    background: #a855f7;
    color: white;
    transform: scale(1.07);
}

/* ====== SEKCJA GŁÓWNA ====== */
.section {
    margin-top: 40px;
}
.section h2 {
    font-size: 32px;
    margin-bottom: 10px;
}
.section p {
    font-size: 20px;
}

/* ====== BOXY ====== */
.boxes {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
}
.box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 25px;
    width: 260px;
    border-radius: 16px;
    backdrop-filter: blur(10px);
}
.box h3 {
    margin-top: 0;
    color: #c084fc;
}
.status-dot {
    width: 14px;
    height: 14px;
    background: #22c55e;
    border-radius: 50%;
    display: inline-block;
}

/* ====== STOPKA ====== */
.footer {
    margin-top: 60px;
    padding-bottom: 40px;
    color: #c4b5fd;
}

</style>
</head>

<body>

<!-- LOGO NA SAMEJ GÓRZE -->
<div class="logo-top">
    <h1>
        <span class="qiux">QiuX</span>
        <span class="google">
            <span style="color:#4285F4;">G</span>
            <span style="color:#EA4335;">o</span>
            <span style="color:#FBBC05;">o</span>
            <span style="color:#4285F4;">g</span>
            <span style="color:#34A853;">l</span>
            <span style="color:#EA4335;">e</span>
        </span>
    </h1>

    <a class="verify" href="mojeprojekty.html">Sprawdź Oryginalność</a>
</div>

<!-- SEKCJA GŁÓWNA -->
<div class="section">
    <h2>Oficjalna strona projektu Q i X</h2>
    <p style="color:#22c55e;">Uruchomień systemu: 1,248</p>
    <p>Stworzone na: GitHub</p>
    <p>Powered by GitHub and GitHub sites</p>
</div>

<!-- BOXY -->
<div class="boxes">
    <div class="box">
        <h3>Moje Projekty</h3>
        <a class="verify" href="mojeprojekty.html">BootQXOS VmPC</a>
    </div>

    <div class="box">
        <h3>Status Systemu</h3>
        <p><span class="status-dot"></span> Serwery GitHub Online</p>
    </div>
</div>

<!-- STOPKA -->
<div class="footer">
    © 2026 QiuX Hub<br>
    Gmail: franekzzz2293@gmail.com<br>
    Tel: +48 665 295 964
</div>

</body>
</html>
