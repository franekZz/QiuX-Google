<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>QiuX Google</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ====== GLOBAL ====== */
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(180deg, #4c1d95 0%, #2e1065 40%, #1a0b3d 100%);
    background-attachment: fixed;
    color: #e5e7eb;
    text-align: center;
}

/* ====== CHMURKI ====== */
body::before, body::after {
    content: "";
    position: fixed;
    width: 900px;
    height: 900px;
    background: radial-gradient(circle, rgba(168,85,247,0.35), transparent 70%);
    filter: blur(120px);
    z-index: -1;
}
body::before { top: -200px; left: -200px; }
body::after { bottom: -200px; right: -200px; }

/* ====== LOGO ====== */
.logo-top {
    text-align: center;
    margin-top: 60px;
}
.logo-top h1 {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: -3px;
    margin-bottom: 10px;
}
.qiux {
    color: #a855f7;
    text-shadow: 0 0 20px #a855f7;
}
.google span {
    font-weight: bold;
    text-shadow: 0 0 12px rgba(255,255,255,0.4);
}

/* ====== PRZYCISK ====== */
.verify {
    display: inline-block;
    margin-top: 10px;
    padding: 14px 32px;
    background: rgba(255,255,255,0.08);
    border: 2px solid #a855f7;
    border-radius: 14px;
    color: #e9d5ff;
    font-size: 22px;
    font-weight: 600;
    text-decoration: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px #a855f7, 0 0 40px rgba(168,85,247,0.6);
    transition: 0.25s;
}
.verify:hover {
    background: #a855f7;
    color: white;
    transform: scale(1.07);
}

</style>
</head>

<body>

<div class="logo-top">
    <h1>
        <span class="qiux">QiuX</span>
        <span class="google">
            <span style="color:#4285F4;">G</span>
            <span style="color:#EA4335;">o</span>
            <span style="color:#FBBC05;">o</span>
            <span style="color:#4285F4;">g</span>
            <span style="color:#34A853;">l</span>
            <span style="color:#EA4335;">e</span>
        </span>
    </h1>

    <a class="verify" href="mojeprojekty.html">Sprawdź Oryginalność</a>
</div>

</body>
</html>
